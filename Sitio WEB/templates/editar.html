<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Vehículo</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f7f9fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    form {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #0052cc;
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <form method="POST">
    <h2>Editar vehículo</h2>
    <label>Tipo:</label>
    <select name="tipo">
      <option>carro</option>
      <option>moto</option>
      <option>moto eléctrica</option>
      <option>bicicleta</option>
      <option>patineta eléctrica</option>
    </select>
    <label>Placa:</label>
    <input type="text" name="placa" value="{{ datos.placa }}">
    <button type="submit">Guardar cambios</button>
  </form>
</body>
</html>
