<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión – Parqueadero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 60%, #1565c0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo span { font-size: 3rem; }
    h2 { text-align: center; color: #1a237e; margin-bottom: 28px; font-size: 1.5rem; }
    label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: .875rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 1rem; margin-bottom: 20px;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #1565c0; }
    button {
      width: 100%; padding: 13px; background: #1565c0; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    button:hover { background: #0d47a1; }
    .error {
      background: #fdecea; color: #c62828; padding: 10px 14px;
      border-radius: 8px; margin-bottom: 20px; font-size: .9rem; text-align: center;
    }
    .hint { text-align: center; color: #aaa; font-size: .78rem; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>🅿️</span></div>
    <h2>Sistema de Parqueadero</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="admin" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••" required>
      <button type="submit">Iniciar sesión</button>
    </form>
    <p class="hint">admin / 1234</p>
  </div>
</body>
</html>
